<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriBridge Africa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          keyframes: {
            blinkColors: {
              '0%, 100%': { color: '#4ade80' }, /* green-400 */
              '33%': { color: '#facc15' }, /* yellow-400 */
              '66%': { color: '#60a5fa' }, /* blue-400 */
            }
          },
          animation: {
            'blink-colors': 'blinkColors 3s ease-in-out infinite',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Custom scrollbar for cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .dark ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    .leaflet-container {
      z-index: 0;
    }

    /* ========== DARK MODE GLOBAL OVERRIDES ========== */

    /* BASE: Default text/bg color for dark mode — catches ALL elements without explicit color classes */
    .dark body,
    .dark #root {
      background-color: #0f172a !important;
      color: #e2e8f0 !important;
    }

    .dark .font-medium {
      color: #e2e8f0;
    }

    .dark .font-bold {
      color: #e2e8f0;
    }

    .dark .font-semibold {
      color: #e2e8f0;
    }

    .dark .text-sm {
      color: #cbd5e1;
    }

    .dark .text-xs {
      color: #94a3b8;
    }

    .dark .text-lg {
      color: #f1f5f9;
    }

    .dark .text-2xl {
      color: #f1f5f9;
    }

    /* Backgrounds */
    .dark .bg-white {
      background-color: #1e293b !important;
    }

    .dark .bg-slate-900 {
      background-color: #334155 !important;
    }

    .dark .bg-slate-800 {
      background-color: #1e293b !important;
    }

    .dark .bg-slate-50 {
      background-color: #0f172a !important;
    }

    .dark .bg-slate-100 {
      background-color: #1e293b !important;
    }

    .dark .bg-slate-50\/50 {
      background-color: rgba(15, 23, 42, 0.5) !important;
    }

    .dark .bg-white\/80 {
      background-color: rgba(30, 41, 59, 0.9) !important;
    }

    .dark .bg-white\/90 {
      background-color: rgba(30, 41, 59, 0.95) !important;
    }

    .dark .bg-green-50 {
      background-color: rgba(22, 101, 52, 0.15) !important;
    }

    .dark .bg-green-50\/50 {
      background-color: rgba(22, 101, 52, 0.1) !important;
    }

    .dark .bg-green-100 {
      background-color: rgba(22, 101, 52, 0.25) !important;
    }

    .dark .bg-blue-50 {
      background-color: rgba(30, 64, 175, 0.15) !important;
    }

    .dark .bg-blue-100 {
      background-color: rgba(30, 64, 175, 0.2) !important;
    }

    .dark .bg-orange-100 {
      background-color: rgba(194, 65, 12, 0.2) !important;
    }

    .dark .bg-red-100 {
      background-color: rgba(185, 28, 28, 0.2) !important;
    }

    .dark .bg-purple-50 {
      background-color: rgba(126, 34, 206, 0.15) !important;
    }

    .dark .bg-yellow-50 {
      background-color: rgba(161, 98, 7, 0.15) !important;
    }

    .dark .bg-orange-50 {
      background-color: rgba(194, 65, 12, 0.15) !important;
    }

    .dark .bg-red-50 {
      background-color: rgba(185, 28, 28, 0.15) !important;
    }

    .dark .bg-green-200 {
      background-color: rgba(22, 101, 52, 0.35) !important;
    }

    .dark [class*="bg-slate-50/30"] {
      background-color: rgba(15, 23, 42, 0.3) !important;
    }

    /* Text Colors */
    .dark .text-slate-900 {
      color: #f1f5f9 !important;
    }

    .dark .text-slate-800 {
      color: #e2e8f0 !important;
    }

    .dark .text-slate-700 {
      color: #cbd5e1 !important;
    }

    .dark .text-slate-600 {
      color: #94a3b8 !important;
    }

    .dark .text-slate-500 {
      color: #64748b !important;
    }

    .dark .text-slate-400 {
      color: #64748b !important;
    }

    .dark .text-green-800 {
      color: #86efac !important;
    }

    .dark .text-green-900 {
      color: #bbf7d0 !important;
    }

    .dark .text-green-700 {
      color: #4ade80 !important;
    }

    .dark .text-blue-700 {
      color: #93c5fd !important;
    }

    .dark .text-orange-700 {
      color: #fdba74 !important;
    }

    .dark .text-red-600 {
      color: #fca5a5 !important;
    }

    .dark .text-purple-900 {
      color: #d8b4fe !important;
    }

    .dark .text-purple-800 {
      color: #c4b5fd !important;
    }

    .dark .text-purple-700 {
      color: #a78bfa !important;
    }

    /* Borders */
    .dark .border-slate-200 {
      border-color: #334155 !important;
    }

    .dark .border-slate-100 {
      border-color: #1e293b !important;
    }

    .dark .border-slate-300 {
      border-color: #475569 !important;
    }

    .dark .border-green-200 {
      border-color: rgba(22, 101, 52, 0.4) !important;
    }

    .dark .border-green-100 {
      border-color: rgba(22, 101, 52, 0.3) !important;
    }

    .dark .border-purple-100 {
      border-color: rgba(126, 34, 206, 0.3) !important;
    }

    /* Form Inputs */
    .dark input,
    .dark textarea,
    .dark select {
      background-color: #1e293b !important;
      border-color: #475569 !important;
      color: #e2e8f0 !important;
    }

    .dark input::placeholder,
    .dark textarea::placeholder {
      color: #64748b !important;
    }

    .dark input:focus,
    .dark textarea:focus,
    .dark select:focus {
      border-color: #22c55e !important;
    }

    /* Tables */
    .dark thead.bg-slate-50 {
      background-color: #0f172a !important;
    }

    .dark .font-mono {
      color: #e2e8f0 !important;
    }

    /* Hover overrides */
    .dark .hover\:bg-slate-50:hover {
      background-color: #334155 !important;
    }

    .dark .hover\:bg-slate-100:hover {
      background-color: #334155 !important;
    }

    .dark .hover\:bg-green-100:hover {
      background-color: rgba(22, 101, 52, 0.35) !important;
    }

    .dark .hover\:bg-white:hover {
      background-color: #334155 !important;
    }

    .dark .hover\:border-slate-300:hover {
      border-color: #475569 !important;
    }

    .dark .hover\:border-blue-400:hover {
      border-color: #60a5fa !important;
    }

    /* Shadows */
    .dark .shadow-sm {
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.3) !important;
    }

    .dark .shadow-green-200 {
      --tw-shadow-color: rgba(22, 101, 52, 0.3) !important;
    }

    .dark .shadow-red-200 {
      --tw-shadow-color: rgba(185, 28, 28, 0.3) !important;
    }

    /* Progress bars keep their color - override the track */
    .dark .bg-slate-100.rounded-full.h-2\.5 {
      background-color: #334155 !important;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-slate-50 text-slate-900 transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
